<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoW Vanilla BR | O Retorno da Nostalgia</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            text-align: center;
        }
        header {
            padding: 50px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://wallpaperaccess.com/full/2222538.jpg'); /* Exemplo de fundo */
            background-size: cover;
            background-position: center;
        }
        h1 { font-size: 3em; color: #ffd700; text-shadow: 2px 2px 4px #000; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background: #b8860b;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: #daa520; transform: scale(1.05); }
        .server-status {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>WoW Vanilla BR</h1>
        <p>A experiência clássica como você sempre quis. Sem modificações, pura nostalgia.</p>
    </header>

    <div class="container">
        <div class="server-status">
            <h2>Status do Servidor</h2>
            <p>Estado: <span style="color: #00ff00;">● Online</span></p>
            <p>Jogadores Online: <b>452</b></p>
        </div>

        <div style="margin-top: 30px;">
            <a href="#" class="btn">Criar Conta</a>
            <a href="#" class="btn">Baixar Cliente</a>
            <a href="#" class="btn">Discord</a>
        </div>
    </div>

    <footer style="margin-top: 50px; font-size: 0.8em; color: #666;">
        <p>&copy; 2026 WoW Vanilla BR - Servidor não oficial. Desenvolvido por fãs.</p>
    </footer>

</body>
</html>
